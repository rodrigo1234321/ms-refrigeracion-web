  </g>
  <!-- Logo Text -->
  <text x="75" y="32" font-family="'Montserrat', sans-serif" font-size="24" font-weight="800" fill="#0a1b3a" letter-spacing="1">MS</text>
  <text x="115" y="32" font-family="'Montserrat', sans-serif" font-size="24" font-weight="500" fill="#4a5568" letter-spacing="1">REFRIGERACION</text>
  <text x="75" y="52" font-family="'Roboto', sans-serif" font-size="11" font-weight="600" fill="#00a8e8" letter-spacing="2">INDUSTRIAL • NAVAL • ALIMENTICIA</text>
